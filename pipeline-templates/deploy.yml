parameters:
  ServiceConnection: ''
  Environment: ''
  SubscriptionAbbreviation: ''
  EnvironmentNames: []
  TimeoutInMinutes: 120

jobs:
- job: ApprovalGate
  displayName: 'Manual Approval - ${{ parameters.Environment }}'
  pool: server
  steps:
  - task: ManualValidation@0
    timeoutInMinutes: 1440
    inputs:
      instructions: 'Please review and approve deployment to ${{ parameters.Environment }}'
      onTimeout: reject

- deployment: DeployInfrastructure
  dependsOn: ApprovalGate
  pool:
    name: DAS - Continuous Deployment Agents
  timeoutInMinutes: ${{ parameters.TimeoutInMinutes }}
  environment: ${{ parameters.Environment }}
  workspace:
    clean: all
  variables:
    MgmtResourceGroupName: 'das-${{ lower(parameters.SubscriptionAbbreviation) }}-mgmt-rg'
  strategy:
    runOnce:
      deploy:
        steps:
        - checkout: self

        - template: azure-pipelines-templates/deploy/step/wait-azure-devops-deployment.yml@das-platform-building-blocks
          parameters:
            EnvironmentId: $(Environment.Id)
            PipelineName: $(Build.DefinitionName)
            RunId: $(Build.BuildId)

        - task: AzurePowerShell@5
          displayName: 'PreDeployment Script'
          inputs:
            azureSubscription: ${{ parameters.ServiceConnection }}
            ScriptPath: '$(Pipeline.Workspace)/drop/Initialize-SharedInfrastructureDeployment.ps1'
            ScriptArguments: '-EnvironmentNames $(EnvironmentNames) -SubscriptionAbbreviation ${{ parameters.SubscriptionAbbreviation }}'
            azurePowerShellVersion: LatestVersion
            pwsh: true

        - task: AzurePowerShell@5
          displayName: 'Azure PowerShell script: set routeTableRoutes'
          inputs:
            azureSubscription: ${{ parameters.ServiceConnection }}
            ScriptType: InlineScript
            Inline: |
              $JsonFilePath = "$(Pipeline.Workspace)/drop/config/routeTableRoutes/${{ lower(parameters.SubscriptionAbbreviation) }}-config.json"

              if (!(Test-Path $JsonFilePath)) {
                  Write-Host "##vso[task.logissue type=error]Configuration file not found: $JsonFilePath"
                  exit 1
              }

              $routeTableRoutes = Get-Content -Raw -Path $JsonFilePath | ConvertFrom-Json
              $routeTableRoutes = $routeTableRoutes | ConvertTo-Json -Depth 10 -Compress

              Write-Host $routeTableRoutes
              Write-Host "Setting pipeline variable: routeTableRoutes"
              Write-Host "##vso[task.setvariable variable=routeTableRoutes]$routeTableRoutes"
            azurePowerShellVersion: LatestVersion
            pwsh: true
          
        - task: AzureResourceManagerTemplateDeployment@3
          displayName: 'Azure Deployment:Create Or Update Resource Group action on $(MgmtResourceGroupName)'
          inputs:
            deploymentScope: 'Resource Group'
            azureResourceManagerConnection: ${{ parameters.ServiceConnection }}
            resourceGroupName: '$(MgmtResourceGroupName)'
            location: 'West Europe'
            csmFile: '$(Pipeline.Workspace)/drop/templates/subscription.template.json'
            csmParametersFile: '$(Pipeline.Workspace)/drop/templates/subscription.parameters.json'
            overrideParameters: "-sqlAdminPasswordSeed $(SqlAdminPasswordSeed) -routeTableRoutes '$(routeTableRoutes)'"
            deploymentOutputs: ARMOutput

        - template: azure-pipelines-templates/deploy/step/retain-on-success.yml@das-platform-building-blocks
          parameters:
            Environment: ${{ parameters.Environment }}
